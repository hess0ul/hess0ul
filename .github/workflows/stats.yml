name: Update GitHub stats cards

on:
  # Refresh once a day
  schedule:
    - cron: "0 6 * * *"
  # Allow manual runs from the Actions tab
  workflow_dispatch:
  # Regenerate whenever content is pushed to main (bootstraps the first run)
  push:
    branches:
      - main

# Avoid overlapping runs
concurrency:
  group: stats-cards
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate overall stats card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: stats
          options: username=${{ github.repository_owner }}&show_icons=true&theme=tokyonight&hide_border=true&include_all_commits=true&rank_icon=github&card_width=815
          path: profile/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate top languages card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: top-langs
          options: username=${{ github.repository_owner }}&layout=donut&theme=tokyonight&hide_border=true&langs_count=8
          path: profile/top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit and push if the cards changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/stats.svg profile/top-langs.svg
          if git diff --staged --quiet; then
            echo "No changes to the stats cards."
          else
            git commit -m "chore: update GitHub stats cards"
            git push
          fi
