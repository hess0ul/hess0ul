name: Generate Snake Animation

on:
  # Re-generate the snake once a day so it stays fresh
  schedule:
    - cron: "0 3 * * *"
  # Allow manual runs from the Actions tab
  workflow_dispatch:
  # Re-generate on every push to main
  push:
    branches:
      - main

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Generate snake SVGs (dark + light)
        uses: Platane/snk@v3
        id: snake-gif
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=#22D3EE
            dist/github-contribution-grid-snake.svg?palette=github-light&color_snake=#155E75

      - name: Push generated SVGs to the output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
